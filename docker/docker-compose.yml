version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
    env_file: ../.env.production
    command: sh -c "pnpm exec prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: juben
      POSTGRES_USER: juben
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juben"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/uploads:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  internal:
